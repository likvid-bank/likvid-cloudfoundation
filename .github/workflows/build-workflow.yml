on:
  workflow_call:
    inputs:
      foundation:
        required: true
        type: string
      platform:
        required: true
        type: string
      action:
        description: Action to perform, either "plan" or "test"
        required: true
        default: 'plan'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.foundation }}
    env:
      TG_TF_PATH: tofu
      TG_PROVIDER_CACHE: 1 # enable provider caching for a speeding up tf inits
      TF_IN_AUTOMATION: true
      TG_NON_INTERACTIVE: true

      # required to enable for azurerm backend, the azurerm provider seems to be fine without these two keys
      ARM_CLIENT_ID: ${{ vars.azure_client_id }}
      ARM_USE_OIDC: true

      # required for the github deployment
      GITHUB_APP_PEM_FILE: ${{ secrets.LIVKID_GITHUB_APP_PEM_FILE }} # note: this environment secret must be set up manually on the github repo

      # required for meshstack e2e tests (stackit platform)
      MESHSTACK_API_KEY_CLOUDFOUNDATION: ${{ secrets.MESHSTACK_API_KEY_CLOUDFOUNDATION }}
      # Optional: real STACKIT service account key for e2e tests. When absent the foundation
      # e2e terragrunt falls back to the placeholder key in the repo (sufficient for foundation
      # mode where no STACKIT API calls are made).
      STACKIT_SERVICE_ACCOUNT_KEY: ${{ secrets.STACKIT_SERVICE_ACCOUNT_KEY }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-nix-shell
        with:
          prepare_terraform: true

      - name: Setup gcloud auth
        if: ${{ inputs.platform == 'gcp' || inputs.platform == 'stackit' }}
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          service_account: '${{ vars.gcp_service_account }}' # sourced from gh environment variable
          workload_identity_provider: '${{ vars.gcp_workload_identity_provider }}'

      - name: Setup az auth
        if: ${{ inputs.platform == 'azure' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.azure_client_id }}
          tenant-id: ${{ vars.azure_tenant_id }}
          subscription-id: ${{ vars.azure_subscription_id }}

      - name: Setup aws auth
        if: ${{ inputs.platform == 'aws' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ vars.aws_iam_role }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: terraform plan
        if: ${{ inputs.action == 'plan' }}
        run: |
          terragrunt plan \
            --all \
            --working-dir="./foundations/${{ inputs.foundation }}/platforms/${{ inputs.platform }}" \
            -- -lock=false -concise

      - name: run tests
        if: ${{ inputs.action == 'test' }}
        run: |
          terragrunt test \
            --all \
            --working-dir="./foundations/${{ inputs.foundation }}/platforms/${{ inputs.platform }}"
